<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APRS Tracker Map — User Guide</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    font-size: 15px;
    line-height: 1.65;
    color: #222;
    background: #f5f5f5;
  }

  header {
    background: #444;
    color: #fff;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  header h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.01em;
  }

  header a {
    color: #ccc;
    text-decoration: none;
    font-size: 0.9rem;
    margin-left: auto;
    white-space: nowrap;
  }

  header a:hover { color: #fff; }

  #content {
    max-width: 820px;
    margin: 32px auto 64px;
    padding: 0 24px;
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 36px 48px;
  }

  #content h1 {
    font-size: 1.7rem;
    font-weight: 700;
    margin-bottom: 6px;
    padding-bottom: 12px;
    border-bottom: 2px solid #ddd;
  }

  #content h2 {
    font-size: 1.3rem;
    font-weight: 700;
    margin-top: 40px;
    margin-bottom: 14px;
    padding-bottom: 6px;
    border-bottom: 1px solid #e0e0e0;
  }

  #content h3 {
    font-size: 1.05rem;
    font-weight: 700;
    margin-top: 28px;
    margin-bottom: 10px;
    color: #333;
  }

  #content h4 {
    font-size: 0.95rem;
    font-weight: 700;
    margin-top: 20px;
    margin-bottom: 8px;
    color: #444;
  }

  #content p { margin-bottom: 12px; }

  #content ul, #content ol {
    margin: 8px 0 14px 24px;
  }

  #content li { margin-bottom: 5px; }

  #content li > p { margin-bottom: 4px; }

  #content strong { font-weight: 700; }

  #content em { font-style: italic; }

  #content code {
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 0.88em;
    background: #f0f0f0;
    border: 1px solid #ddd;
    border-radius: 3px;
    padding: 1px 5px;
  }

  #content pre {
    background: #f0f0f0;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 14px 16px;
    overflow-x: auto;
    margin: 10px 0 16px;
    font-size: 0.88em;
    line-height: 1.5;
  }

  #content pre code {
    background: none;
    border: none;
    padding: 0;
  }

  #content table {
    border-collapse: collapse;
    width: 100%;
    margin: 12px 0 18px;
    font-size: 0.93em;
  }

  #content th {
    background: #444;
    color: #fff;
    text-align: left;
    padding: 8px 12px;
    font-weight: 600;
  }

  #content td {
    padding: 7px 12px;
    border-bottom: 1px solid #e0e0e0;
    vertical-align: top;
  }

  #content tr:nth-child(even) td { background: #fafafa; }

  #content hr {
    border: none;
    border-top: 1px solid #e0e0e0;
    margin: 32px 0;
  }

  #loading {
    text-align: center;
    padding: 60px;
    color: #888;
  }

  @media (max-width: 680px) {
    #content { padding: 24px 18px; margin: 16px 8px 40px; }
    header { padding: 12px 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>APRS Tracker Map</h1>
  <a href="/">&#8592; Return to Map</a>
</header>

<div id="content">
  <div id="loading">Loading…</div>
</div>

<script>
  fetch('USERGUIDE.MD')
    .then(r => r.text())
    .then(md => {
      document.getElementById('content').innerHTML = marked.parse(md);
    })
    .catch(() => {
      document.getElementById('content').innerHTML =
        '<p style="color:red">Could not load user guide.</p>';
    });
</script>
</body>
</html>
