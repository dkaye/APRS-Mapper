<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html/admin>
        <Files "password.txt">
            Require all denied
        </Files>
    </Directory>
    <Directory /var/www/html/igate/wifi>
        <Files "wifi.yaml">
            Require all denied
        </Files>
    </Directory>
    <Directory /var/www/html/netbird>
        <Files "addresses.yaml">
            Require all denied
        </Files>
    </Directory>
    <Directory /var/www/html>
        Options -Indexes
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
