<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html/admin>
        <Files "password.txt">
            Require all denied
        </Files>
    </Directory>
    <Directory /var/www/html/igate/wifi>
        <Files "wifi.yaml">
            Require all denied
        </Files>
    </Directory>
    <Directory /var/www/html/netbird>
        <Files "addresses.yaml">
            Require all denied
        </Files>
    </Directory>
    <Directory /var/www/html/tickets>
        <FilesMatch "^(tickets|versions)\.json$">
            Require all denied
        </FilesMatch>
    </Directory>
    <Directory /var/www/html>
        Options -Indexes
    </Directory>

    # Prevent Cloudflare from caching iGate update files
    <LocationMatch "^/igate/.*\.(tar\.gz|sh)$">
        Header set Cache-Control "no-store, no-cache, must-revalidate"
        Header set Pragma "no-cache"
    </LocationMatch>

    # Proxy /analyzer/ to the Flask analyzer app (gunicorn on 127.0.0.1:5001)
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Prefix "/analyzer"
    ProxyPass /analyzer/ http://127.0.0.1:5001/
    ProxyPassReverse /analyzer/ http://127.0.0.1:5001/

    RewriteEngine On
    RewriteRule ^/analyzer$ /analyzer/ [R=301,L]
    RewriteRule ^/tickets/admin$ /tickets/admin.php [L]

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
