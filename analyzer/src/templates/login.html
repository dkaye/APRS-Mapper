<!doctype html>
<html>
<head>
    <title>MARS APRS Analyzer — Login</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f5f5f5;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
            width: 320px;
        }
        h2 { margin: 0 0 24px; font-size: 20px; color: #333; }
        input[type=password] {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 16px;
        }
        button {
            width: 100%;
            padding: 10px;
            font-size: 15px;
            background: #2c7be5;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background: #1a6bc9; }
        .error { color: #e74c3c; font-size: 14px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>MARS APRS Analyzer</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post">
            <input type="password" name="password" placeholder="Event Password" autofocus>
            <button type="submit">Sign In</button>
        </form>
    </div>
</body>
</html>
