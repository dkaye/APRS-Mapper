# igate-logs.conf — recreate /var/log subdirectory structure at each boot
# Required because /var/log is mounted as tmpfs (empty on boot).
# systemd-tmpfiles-setup.service applies this before services start.

d /var/log/direwolf 0755 pi       pi       - -
d /var/log/lighttpd 0750 www-data www-data - -
d /var/log/netbird  0755 root     root     - -
d /var/log/apt      0755 root     root     - -
d /var/log/cups     0755 root     root     - -
d /var/log/runit    0755 root     root     - -
d /var/log/watchdog 0755 root     root     - -
d /var/log/private  0700 root     root     - -
f /var/log/wtmp     0664 root     utmp     - -
f /var/log/lastlog  0664 root     utmp     - -
f /var/log/btmp     0600 root     utmp     - -
